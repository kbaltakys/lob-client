site_name: DeltaBerry API Documentation
site_description: Documentation for the DeltaBerry API, including authentication, endpoints, and usage examples.
site_url: https://docs.deltaberry.com

repo_url: https://github.com/kbaltakys/lob-client
repo_name: kbaltakys/lob-client

theme:
  name: material
  features:
    - content.code.copy
    - navigation.sections
    - navigation.expand
    - navigation.top
    - toc.integrate

nav:
  - Home: index.md
  - Getting started: getting-started.md
  - Subscribing to signals: signals.md
  - Label specs: label-specs.md
  - API reference: api.md

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - toc:
      permalink: true

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          paths: [../src]
          options:
            show_source: false
            show_root_heading: true
            members_order: source
            docstring_style: google
